<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Tic-Tac-Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #1a1a2e;
      color: #eee;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
    }

    h1 { font-size: 2rem; margin-bottom: 1rem; color: #e94560; }

    #status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      min-height: 1.5rem;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #e94560;
      border-radius: 8px;
      font-size: 3rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      user-select: none;
    }

    .cell:hover:not(.taken) { background: #0f3460; }
    .cell.taken { cursor: default; }

    #restart {
      margin-top: 1.5rem;
      padding: 0.6rem 2rem;
      font-size: 1rem;
      background: #e94560;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    #restart:hover { background: #c73652; }
  </style>
</head>
<body>
  <h1>Tic-Tac-Toe</h1>
  <div id="status">Du bist X. Viel Spaß!</div>
  <div id="board"></div>
  <button id="restart">Neu starten</button>

  <script>
    const statusEl = document.getElementById("status");
    const boardEl = document.getElementById("board");
    const restartBtn = document.getElementById("restart");

    let board, gameOver;

    const WIN = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    function checkWinner(b, player) {
      return WIN.some(combo => combo.every(i => b[i] === player));
    }

    function bestMove(b) {
      // Minimax
      function minimax(b, isMax) {
        if (checkWinner(b, "O")) return 10;
        if (checkWinner(b, "X")) return -10;
        if (b.every(c => c)) return 0;

        let best = isMax ? -Infinity : Infinity;
        for (let i = 0; i < 9; i++) {
          if (!b[i]) {
            b[i] = isMax ? "O" : "X";
            const score = minimax(b, !isMax);
            b[i] = null;
            best = isMax ? Math.max(best, score) : Math.min(best, score);
          }
        }
        return best;
      }

      let bestScore = -Infinity, move = -1;
      for (let i = 0; i < 9; i++) {
        if (!b[i]) {
          b[i] = "O";
          const score = minimax(b, false);
          b[i] = null;
          if (score > bestScore) { bestScore = score; move = i; }
        }
      }
      return move;
    }

    function render() {
      boardEl.innerHTML = "";
      board.forEach((val, i) => {
        const cell = document.createElement("div");
        cell.className = "cell" + (val ? " taken" : "");
        cell.textContent = val || "";
        cell.addEventListener("click", () => playerMove(i));
        boardEl.appendChild(cell);
      });
    }

    function playerMove(i) {
      if (gameOver || board[i]) return;
      board[i] = "X";
      if (checkWinner(board, "X")) {
        render();
        statusEl.textContent = "Du hast gewonnen! 🎉";
        gameOver = true;
        return;
      }
      if (board.every(c => c)) {
        render();
        statusEl.textContent = "Unentschieden!";
        gameOver = true;
        return;
      }
      statusEl.textContent = "Computer denkt...";
      render();
      setTimeout(() => {
        const move = bestMove(board);
        board[move] = "O";
        render();
        if (checkWinner(board, "O")) {
          statusEl.textContent = "Computer gewinnt! 🤖";
          gameOver = true;
        } else if (board.every(c => c)) {
          statusEl.textContent = "Unentschieden!";
          gameOver = true;
        } else {
          statusEl.textContent = "Du bist dran (X)";
        }
      }, 400);
    }

    function init() {
      board = Array(9).fill(null);
      gameOver = false;
      statusEl.textContent = "Du bist X. Viel Spaß!";
      render();
    }

    restartBtn.addEventListener("click", init);
    init();
  </script>
</body>
</html>
